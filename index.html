<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aim Master: ZENITH PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Michroma&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Michroma', sans-serif; cursor: none; }

        #main-wrapper { display: flex; width: 100vw; height: 100vh; }
        .void { flex: 1; background: #020205; opacity: 0.5; position: relative; }
        .void::before { content: 'SYSTEM_READY'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #111; letter-spacing: 10px; font-size: 10px; }

        #game-stage {
            flex: 2; position: relative; overflow: hidden;
            border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a;
            background: radial-gradient(circle at center, #050510 0%, #000 100%);
        }

        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: #0ff; }
        .hud-element { position: absolute; padding: 25px; text-shadow: 0 0 15px #0ff; }
        #hud-left { top: 0; left: 0; }
        #hud-right { top: 0; right: 0; text-align: right; }
        
        #crosshair {
            position: absolute; width: 26px; height: 26px;
            border: 1px solid rgba(0, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }

        .miss-text {
            position: absolute; color: #ff0055; font-weight: bold; font-size: 14px;
            pointer-events: none; animation: fadeOutUp 0.4s ease-out forwards; z-index: 50;
            text-shadow: 0 0 8px #ff0000; font-family: 'Syncopate';
        }

        @keyframes fadeOutUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .stat-line { font-size: 16px; color: #aaa; margin: 8px 0; letter-spacing: 2px; }
        .stat-val { color: #fff; font-weight: bold; }
        .high-score-label { color: #0ff; font-size: 14px; margin-bottom: 30px; letter-spacing: 4px; }

        .start-btn {
            background: transparent; border: 1px solid #0ff; color: #0ff; padding: 20px 60px;
            font-family: 'Syncopate', sans-serif; cursor: pointer; transition: 0.3s;
            margin-top: 25px; letter-spacing: 3px;
        }
        .start-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 40px #0ff; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="void"></div>
    <div id="game-stage">
        <div id="crosshair"></div>
        <div id="ui-layer">
            <div id="hud-left" class="hud-element">
                <div style="font-size: 9px; opacity: 0.6; letter-spacing: 2px;">SCORE</div>
                <div id="score" style="font-size: 28px; color: #fff;">0000</div>
            </div>
            <div id="hud-right" class="hud-element">
                <div style="font-size: 9px; opacity: 0.6; letter-spacing: 2px;">TIMER</div>
                <div id="timer" style="font-size: 28px; color: #fff;">30.00</div>
            </div>
        </div>

        <div id="overlay">
            <div id="menu-content" style="text-align: center;">
                <h1 style="font-family: 'Syncopate'; color: #fff; margin-bottom: 5px; letter-spacing: 10px;">ZENITH_PRO</h1>
                <div id="high-score-display" class="high-score-label">BEST_RUN: 0</div>
                
                <div id="last-results" style="display: none; margin-bottom: 30px; padding: 25px; background: rgba(0,255,255,0.05); border: 1px solid #222; border-radius: 4px;">
                    <div class="stat-line">HITS: <span id="res-hits" class="stat-val">0</span></div>
                    <div class="stat-line">MISSES: <span id="res-miss" class="stat-val" style="color:#ff0055">0</span></div>
                    <div class="stat-line">ACCURACY: <span id="res-acc" class="stat-val" style="color:#0f0">0</span>%</div>
                </div>

                <button class="start-btn" onclick="initSession()">START SESSION</button>
            </div>
        </div>
    </div>
    <div class="void"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, raycaster, core, ring;
let score = 0, hits = 0, misses = 0, clicks = 0, streak = 0, startTime, gameActive = false;
const stage = document.getElementById('game-stage');
const mouse = new THREE.Vector2();

// Audio Engine
const audio = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, type, d, v) {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f, audio.currentTime);
    g.gain.setValueAtTime(v, audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
    o.connect(g);
    g.connect(audio.destination);
    o.start();
    o.stop(audio.currentTime + d);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, stage.clientWidth / stage.clientHeight, 0.1, 1000);
    camera.position.z = 10;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(stage.clientWidth, stage.clientHeight);
    stage.appendChild(renderer.domElement);

    raycaster = new THREE.Raycaster();
    
    // Grid
    const grid = new THREE.GridHelper(40, 20, 0x111122, 0x050510);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -5;
    scene.add(grid);

    const best = localStorage.getItem('zenith_pro_best') || 0;
    document.getElementById('high-score-display').innerText = `BEST_RUN: ${best}`;

    stage.addEventListener('mousemove', onMove);
    stage.addEventListener('mousedown', onShoot);
    window.addEventListener('resize', onResize);
    loop();
}

window.initSession = () => {
    if (audio.state === 'suspended') audio.resume();
    score = 0; hits = 0; misses = 0; clicks = 0; streak = 0;
    startTime = Date.now();
    gameActive = true;
    document.getElementById('overlay').style.display = 'none';
    spawn();
};

function spawn() {
    if(core) scene.remove(core, ring);
    
    // Dynamic color based on streak
    let color = 0x00ffff;
    if(streak >= 15) color = 0xff00ff;
    else if(streak >= 7) color = 0xffff00;

    core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 0), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1.5 }));
    ring = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.02, 16, 40), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4 }));
    
    const x = (Math.random()-0.5)*11, y = (Math.random()-0.5)*7.5;
    core.position.set(x, y, 0); ring.position.set(x, y, 0);
    scene.add(core, ring);
}

function onMove(e) {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    mouse.x = (x / stage.clientWidth) * 2 - 1;
    mouse.y = -(y / stage.clientHeight) * 2 + 1;
    document.getElementById('crosshair').style.left = x + 'px';
    document.getElementById('crosshair').style.top = y + 'px';
}

function onShoot(e) {
    if(!gameActive) return;
    clicks++;
    raycaster.setFromCamera(mouse, camera);
    const intersect = raycaster.intersectObject(core);

    if(intersect.length > 0) {
        hits++; streak++;
        score += 100 + (streak * 10);
        // Reward Sound (higher pitch as streak grows)
        playSfx(500 + (streak * 30), 'sine', 0.12, 0.15);
        spawn();
    } else {
        misses++; streak = 0;
        // Heavy Error Sound
        playSfx(140, 'sawtooth', 0.2, 0.1);
        showMissLabel(e);
    }
    document.getElementById('score').innerText = score.toString().padStart(4, '0');
}

function showMissLabel(e) {
    const rect = stage.getBoundingClientRect();
    const miss = document.createElement('div');
    miss.className = 'miss-text';
    miss.innerText = 'MISS';
    miss.style.left = (e.clientX - rect.left) + 'px';
    miss.style.top = (e.clientY - rect.top) + 'px';
    stage.appendChild(miss);
    setTimeout(() => miss.remove(), 400);
}

function onResize() {
    camera.aspect = stage.clientWidth / stage.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(stage.clientWidth, stage.clientHeight);
}

function loop() {
    requestAnimationFrame(loop);
    if(gameActive) {
        const rem = Math.max(0, 30 - (Date.now() - startTime) / 1000);
        document.getElementById('timer').innerText = rem.toFixed(2);
        if(core) { 
            core.rotation.y += 0.06; 
            ring.rotation.z -= 0.02; 
        }
        if(rem <= 0) endGame();
    }
    renderer.render(scene, camera);
}

function endGame() {
    gameActive = false;
    const best = parseInt(localStorage.getItem('zenith_pro_best') || 0);
    if(score > best) localStorage.setItem('zenith_pro_best', score);
    
    document.getElementById('high-score-display').innerText = `BEST_RUN: ${localStorage.getItem('zenith_pro_best')}`;
    document.getElementById('res-hits').innerText = hits;
    document.getElementById('res-miss').innerText = misses;
    document.getElementById('res-acc').innerText = clicks > 0 ? Math.round((hits/clicks)*100) : 0;
    
    document.getElementById('last-results').style.display = 'block';
    document.getElementById('overlay').style.display = 'flex';
}

init();
</script>
</body>
</html>
